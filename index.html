<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מוריד השירים שלי</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        input { padding: 12px; border-radius: 25px; border: none; width: 80%; max-width: 400px; margin-bottom: 10px; }
        button { padding: 12px 25px; border-radius: 25px; border: none; background: #1db954; color: white; font-weight: bold; cursor: pointer; }
        .results { margin-top: 20px; text-align: right; max-width: 500px; margin-left: auto; margin-right: auto; }
        .song-item { background: #282828; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        a { color: #1db954; text-decoration: none; }
    </style>
</head>
<body>
    <h1>🔎 חיפוש והורדת שירים</h1>
    <input type="text" id="artistQuery" placeholder="הכנס שם זמר או שיר...">
    <br>
    <button onclick="searchAndDownload()">חפש והורד 100 תוצאות</button>

    <div class="results" id="status"></div>

    <script>
        async function searchAndDownload() {
            const query = document.getElementById('artistQuery').value;
            const status = document.getElementById('status');
            if (!query) return alert("נא להזין שם!");

            status.innerHTML = "⏳ מתחיל בחיפוש והורדה של 100 שירים... זה עשוי לקחת זמן.";
            
            // שליחת שאילתה לשרת
            try {
                const response = await fetch(`/.netlify/functions/download?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                status.innerHTML = `✅ הסתיימה ההורדה של תוצאות עבור: ${query}`;
            } catch (e) {
                status.innerHTML = "❌ שגיאה בחיבור לשרת.";
            }
        }
    </script>
</body>
</html>
